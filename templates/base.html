<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title|default:'Visa Card — Карта от кыргызского банка' }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ meta_description|default:'Оформление карты Visa от банка Кыргызстана. Выпуск за 5–7 дней, бесплатное пополнение из России.' }}{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}{{ meta_keywords|default:'Visa, карта Visa, Кыргызстан, банк, оформление карты' }}{% endblock %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ canonical_url|default:'' }}">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ru_RU">
    <meta property="og:title" content="{{ title|default:'Visa Card — Карта от кыргызского банка' }}">
    <meta property="og:description" content="{{ meta_description|default:'Оформление карты Visa от банка Кыргызстана.' }}">
    <meta property="og:url" content="{{ canonical_url|default:'' }}">
    {% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
    <meta property="og:site_name" content="Visa Card">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title|default:'Visa Card — Карта от кыргызского банка' }}">
    <meta name="twitter:description" content="{{ meta_description|default:'Оформление карты Visa от банка Кыргызстана.' }}">
    {% if og_image %}<meta name="twitter:image" content="{{ og_image }}">{% endif %}
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%237c3aed'/%3E%3Ctext x='16' y='22' font-family='system-ui' font-size='16' font-weight='bold' fill='white' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
    <link rel="alternate" hreflang="ru" href="{{ canonical_url|default:'' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    {% include "inline_styles.html" %}
</head>
<body>
    {% block content %}{% endblock %}
    {% include "inline_scripts.html" %}
    {% block extra_js %}{% endblock %}
</body>
</html>
