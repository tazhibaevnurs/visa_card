{% comment %}Inlined CSS so styles work when /static/ is not served (e.g. Vercel){% endcomment %}
<style>
/* ===== Variables ===== */
:root {
  --bg-dark: #0a0a0f;
  --bg-card: rgba(18, 18, 28, 0.7);
  --accent-purple: #7c3aed;
  --accent-purple-light: #a78bfa;
  --accent-gold: #f59e0b;
  --accent-gold-light: #fbbf24;
  --text-primary: #f1f5f9;
  --text-muted: #94a3b8;
  --border-glass: rgba(255, 255, 255, 0.08);
  --glow-purple: rgba(124, 58, 237, 0.4);
  --glow-gold: rgba(245, 158, 11, 0.3);
  --font-heading: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --radius: 16px;
  --radius-lg: 24px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg-dark);
  overflow-x: hidden;
}
h1, h2, h3 { font-family: var(--font-heading); font-weight: 700; }
a { color: var(--accent-purple-light); text-decoration: none; }
a:hover { color: var(--accent-gold); }
img { max-width: 100%; height: auto; }
.container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 16px 0;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-glass);
  transition: var(--transition);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-family: var(--font-heading); font-weight: 700; font-size: 1.25rem; color: var(--text-primary); -webkit-text-fill-color: initial; }
.nav-links { display: flex; align-items: center; gap: 28px; list-style: none; margin: 0; padding: 0; }
.nav-links a { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; transition: color var(--transition); }
.nav-links a:hover { color: var(--text-primary); }
.btn-sm { padding: 10px 18px; font-size: 0.9rem; }
.nav-toggle { display: none; width: 40px; height: 40px; background: none; border: none; cursor: pointer; position: relative; padding: 0; }
.nav-toggle::before, .nav-toggle::after { content: ''; position: absolute; left: 10px; right: 10px; height: 2px; background: var(--text-primary); transition: var(--transition); }
.nav-toggle::before { top: 12px; }
.nav-toggle::after { top: 22px; }
.nav-toggle[aria-expanded="true"]::before { transform: rotate(45deg); top: 17px; }
.nav-toggle[aria-expanded="true"]::after { transform: rotate(-45deg); top: 17px; }
.nav-mobile { display: none; flex-direction: column; gap: 12px; padding: 20px 24px; background: rgba(10, 10, 15, 0.98); border-top: 1px solid var(--border-glass); }
.nav-mobile a { color: var(--text-primary); }
@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-toggle { display: block; }
  .nav-mobile.is-open { display: flex; }
}
.hero {
  min-height: 100vh;
  padding-top: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 80px 0 120px;
}
.hero-bg { position: absolute; inset: 0; z-index: 0; }
.hero-gradient {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -20%, var(--glow-purple), transparent 50%),
              radial-gradient(ellipse 60% 40% at 80% 60%, rgba(124, 58, 237, 0.15), transparent 40%),
              radial-gradient(ellipse 50% 30% at 20% 80%, var(--glow-gold), transparent 40%);
  pointer-events: none;
}
.hero-grid {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
  pointer-events: none;
}
.hero-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.35;
  pointer-events: none;
  animation: glow-float 8s ease-in-out infinite;
}
.hero-glow-1 { background: var(--accent-purple); top: 10%; right: 10%; animation-delay: 0s; }
.hero-glow-2 { background: var(--accent-gold); bottom: 20%; left: 5%; animation-delay: -4s; }
@keyframes glow-float {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.35; }
  33% { transform: translate(30px, -20px) scale(1.1); opacity: 0.45; }
  66% { transform: translate(-20px, 15px) scale(0.95); opacity: 0.3; }
}
.hero-orb { position: absolute; border-radius: 50%; pointer-events: none; animation: orb-float 12s ease-in-out infinite; }
.hero-orb-1 { width: 80px; height: 80px; background: rgba(124, 58, 237, 0.2); top: 20%; left: 15%; animation-delay: 0s; }
.hero-orb-2 { width: 120px; height: 120px; background: rgba(245, 158, 11, 0.12); bottom: 25%; right: 20%; animation-delay: -3s; }
.hero-orb-3 { width: 60px; height: 60px; background: rgba(167, 139, 250, 0.15); top: 60%; left: 8%; animation-delay: -6s; }
@keyframes orb-float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(15px, -25px) scale(1.05); }
  50% { transform: translate(-10px, 10px) scale(0.98); }
  75% { transform: translate(20px, 15px) scale(1.02); }
}
.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  z-index: 1;
}
@media (max-width: 900px) {
  .hero-inner { grid-template-columns: 1fr; text-align: center; }
  .hero-card-wrap { order: -1; }
}
.hero-title {
  font-size: clamp(2rem, 5vw, 3.25rem);
  line-height: 1.15;
  margin: 0 0 20px;
  background: linear-gradient(135deg, #fff 0%, var(--accent-purple-light) 50%, var(--accent-gold) 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% auto;
  animation: gradient-shift 8s ease infinite;
}
@keyframes gradient-shift {
  0%, 100% { background-position: 0% center; }
  50% { background-position: 100% center; }
}
.hero-subtitle { font-size: 1.15rem; color: var(--text-muted); margin: 0 0 32px; max-width: 480px; }
.hero-inner .hero-text:not(.scroll-reveal) .hero-subtitle { max-width: none; }
.hero-price {
  display: inline-flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  padding: 12px 20px;
  background: rgba(124, 58, 237, 0.15);
  border: 1px solid rgba(124, 58, 237, 0.35);
  border-radius: var(--radius);
  animation: price-pulse 3s ease-in-out infinite;
}
@keyframes price-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.2); }
  50% { box-shadow: 0 0 24px 4px rgba(124, 58, 237, 0.15); }
}
.hero-price-label { font-size: 0.95rem; color: var(--text-muted); }
.hero-price-value { font-family: var(--font-heading); font-weight: 700; font-size: 1.5rem; color: var(--accent-gold); }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 1rem;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent-purple), #5b21b6);
  color: #fff;
  box-shadow: 0 4px 24px var(--glow-purple);
}
.btn-primary:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 12px 40px var(--glow-purple);
}
.btn-primary:active { transform: translateY(-2px) scale(0.98); }
.btn-telegram { position: relative; overflow: hidden; }
.btn-telegram::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.btn-telegram:hover::after { transform: translateX(100%); }
.btn-large { padding: 20px 36px; font-size: 1.1rem; }
.btn-icon { display: flex; align-items: center; }
.hero-card-wrap {
  perspective: 1200px;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: card-float 6s ease-in-out infinite;
}
@keyframes card-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.card-3d {
  width: 320px;
  height: 200px;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  cursor: pointer;
  filter: drop-shadow(0 25px 50px rgba(0,0,0,0.4));
}
.card-3d:hover { filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5)) drop-shadow(0 0 40px rgba(124, 58, 237, 0.2)); }
.card-3d-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.15s ease-out; }
.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
.card-front {
  background: linear-gradient(145deg, #1e1e2e 0%, #2d2d44 100%);
  border: 1px solid var(--border-glass);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.4);
}
.card-back {
  background: linear-gradient(145deg, #252535 0%, #1a1a28 100%);
  border: 1px solid var(--border-glass);
  transform: rotateY(180deg);
}
.card-chip { width: 44px; height: 34px; background: linear-gradient(135deg, #d4af37, #f5e6a3); border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2); }
.card-logo { position: absolute; top: 24px; right: 24px; font-family: var(--font-heading); font-weight: 700; font-size: 1.5rem; letter-spacing: 0.1em; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
.card-number { font-family: 'Space Mono', monospace; font-size: 1.25rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.9); }
.card-holder, .card-expiry { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.card-expiry { align-self: flex-end; }
.card-magstrip { position: absolute; top: 24px; left: 0; right: 0; height: 40px; background: #1a1a1a; }
.card-signature { margin-top: 50px; height: 32px; background: repeating-linear-gradient(90deg, #333 0, #333 4px, #222 4px, #222 8px); border-radius: 4px; }
.card-cvc { position: absolute; bottom: 24px; right: 24px; font-size: 0.85rem; color: var(--text-muted); }
.hero-scroll {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.85rem;
}
.scroll-arrow {
  width: 24px;
  height: 24px;
  border-right: 2px solid var(--text-muted);
  border-bottom: 2px solid var(--text-muted);
  transform: rotate(45deg);
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%, 100% { transform: rotate(45deg) translateY(0); }
  50% { transform: rotate(45deg) translateY(6px); }
}
.section { padding: 100px 0; position: relative; }
.section-title {
  font-size: clamp(1.75rem, 4vw, 2.5rem);
  text-align: center;
  margin: 0 0 16px;
  color: var(--text-primary);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s var(--ease-out-expo), transform 0.6s var(--ease-out-expo);
}
.section-title.revealed { opacity: 1; transform: translateY(0); }
.section-subtitle {
  text-align: center;
  color: var(--text-muted);
  margin: 0 0 48px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s var(--ease-out-expo) 0.1s, transform 0.6s var(--ease-out-expo) 0.1s;
}
.section-subtitle.revealed { opacity: 1; transform: translateY(0); }
.glass {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
}
.benefits { background: linear-gradient(180deg, transparent 0%, rgba(124, 58, 237, 0.03) 50%, transparent 100%); }
.benefits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; perspective: 1200px; }
.benefit-card {
  padding: 28px;
  border-radius: var(--radius-lg);
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s ease, border-color 0.3s ease;
  opacity: 0;
  transform: translateY(40px) rotateX(12deg);
  transform-style: preserve-3d;
  will-change: transform;
}
.benefit-card.revealed { opacity: 1; transform: translateY(0) rotateX(0); }
.benefit-card.revealed:nth-child(1) { transition-delay: 0.05s; }
.benefit-card.revealed:nth-child(2) { transition-delay: 0.1s; }
.benefit-card.revealed:nth-child(3) { transition-delay: 0.15s; }
.benefit-card.revealed:nth-child(4) { transition-delay: 0.2s; }
.benefit-card.revealed:nth-child(5) { transition-delay: 0.25s; }
.benefit-card.revealed:nth-child(6) { transition-delay: 0.3s; }
.benefit-card.revealed:nth-child(7) { transition-delay: 0.35s; }
.benefit-card.revealed:nth-child(8) { transition-delay: 0.4s; }
.benefit-card:hover {
  border-color: rgba(124, 58, 237, 0.4);
  box-shadow: 0 20px 50px -15px rgba(0,0,0,0.4), 0 0 40px -10px rgba(124, 58, 237, 0.25);
  transform: translateY(-8px) rotateX(-2deg) scale(1.02);
}
.benefit-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent-purple), #5b21b6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 16px;
  transform: translateZ(20px);
  transition: transform 0.3s ease;
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
}
.benefit-card:hover .benefit-icon { transform: translateZ(24px) scale(1.08); }
.benefit-card h3 { font-size: 1.15rem; margin: 0 0 8px; color: var(--text-primary); }
.benefit-card p { margin: 0; font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }
.process-steps { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; align-items: stretch; perspective: 1000px; }
.process-step {
  flex: 1 1 200px;
  max-width: 260px;
  padding: 28px;
  border-radius: var(--radius-lg);
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  text-align: center;
  transition: transform 0.45s var(--ease-out-expo), box-shadow 0.4s ease, border-color 0.3s ease;
  opacity: 0;
  transform: translateY(30px) scale(0.96);
  position: relative;
}
.process-step.revealed { opacity: 1; transform: translateY(0) scale(1); }
.process-step.revealed:nth-child(1) { transition-delay: 0.05s; }
.process-step.revealed:nth-child(3) { transition-delay: 0.15s; }
.process-step.revealed:nth-child(5) { transition-delay: 0.25s; }
.process-step.revealed:nth-child(7) { transition-delay: 0.35s; }
.process-step:hover {
  border-color: rgba(245, 158, 11, 0.45);
  box-shadow: 0 24px 48px -12px rgba(0,0,0,0.35), 0 0 30px -8px rgba(245, 158, 11, 0.2);
  transform: translateY(-6px) scale(1.03);
}
.step-num {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-gold), #d97706);
  color: #000;
  font-weight: 700;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
  animation: step-pulse 2.5s ease-in-out infinite;
}
@keyframes step-pulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4); }
  50% { box-shadow: 0 6px 24px rgba(245, 158, 11, 0.5); }
}
.step-icon { font-size: 2.5rem; margin-bottom: 12px; display: inline-block; transition: transform 0.35s var(--ease-out-expo); }
.process-step:hover .step-icon { transform: scale(1.15) translateY(-4px); }
.process-step h3 { font-size: 1.05rem; margin: 0 0 8px; }
.process-step p { margin: 0; font-size: 0.9rem; color: var(--text-muted); }
.process-connector { width: 24px; align-self: center; border-top: 2px dashed var(--border-glass); }
@media (max-width: 700px) {
  .process-connector { width: 100%; max-width: 200px; margin: 0 auto; border-top: none; border-left: 2px dashed var(--border-glass); min-height: 24px; }
  .process-steps { flex-direction: column; align-items: center; }
  .process-step { max-width: 100%; }
}
.tariff-main {
  padding: 32px;
  margin-bottom: 24px;
  text-align: center;
  border: 1px solid rgba(245, 158, 11, 0.25);
  background: linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0%, rgba(124, 58, 237, 0.06) 100%);
  transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s ease;
  transform: translateZ(0);
}
.tariff-main:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px -15px rgba(0,0,0,0.3), 0 0 40px -10px rgba(245, 158, 11, 0.15);
}
.tariff-price-block { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.tariff-price-label { font-size: 0.95rem; color: var(--text-muted); }
.tariff-price-value {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 2.5rem;
  color: var(--accent-gold);
  letter-spacing: 0.02em;
  text-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
  animation: price-glow 3s ease-in-out infinite;
}
@keyframes price-glow {
  0%, 100% { text-shadow: 0 0 40px rgba(245, 158, 11, 0.25); }
  50% { text-shadow: 0 0 60px rgba(245, 158, 11, 0.4); }
}
.tariff-price-note { margin: 0; font-size: 0.95rem; color: var(--text-muted); max-width: 520px; margin-left: auto; margin-right: auto; }
.tariff-card-note {
  padding: 24px 28px;
  margin-bottom: 24px;
  border-left: 4px solid var(--accent-purple);
  transition: transform 0.35s var(--ease-out-expo), box-shadow 0.35s ease;
}
.tariff-card-note:hover { transform: translateX(6px); box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.2); }
.tariff-card-note h3 { font-size: 1.1rem; margin: 0 0 10px; }
.tariff-card-note p { margin: 0; color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }
.tariffs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px; }
.tariff-card {
  padding: 28px;
  transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s ease, border-color 0.3s ease;
  opacity: 0;
  transform: translateY(28px);
}
.tariff-card.revealed { opacity: 1; transform: translateY(0); }
.tariff-card.revealed:nth-child(1) { transition-delay: 0.1s; }
.tariff-card.revealed:nth-child(2) { transition-delay: 0.2s; }
.tariff-card.revealed:nth-child(3) { transition-delay: 0.3s; }
.tariff-card:hover {
  border-color: rgba(124, 58, 237, 0.35);
  box-shadow: 0 16px 48px -12px rgba(0,0,0,0.35), 0 0 30px -8px rgba(124, 58, 237, 0.2);
  transform: translateY(-6px);
}
.tariff-card h3 { font-size: 1.2rem; margin: 0 0 12px; }
.tariff-card p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }
.tariffs-note { text-align: center; color: var(--text-muted); font-size: 0.95rem; margin: 0; }
.faq-list { max-width: 720px; margin: 0 auto; }
.faq-item {
  margin-bottom: 16px;
  border-radius: var(--radius);
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s var(--ease-out-expo), transform 0.5s var(--ease-out-expo);
}
.faq-item.revealed { opacity: 1; transform: translateY(0); }
.faq-item.revealed:nth-child(1) { transition-delay: 0.03s; }
.faq-item.revealed:nth-child(2) { transition-delay: 0.06s; }
.faq-item.revealed:nth-child(3) { transition-delay: 0.09s; }
.faq-item.revealed:nth-child(4) { transition-delay: 0.12s; }
.faq-item.revealed:nth-child(5) { transition-delay: 0.15s; }
.faq-item.revealed:nth-child(6) { transition-delay: 0.18s; }
.faq-item.revealed:nth-child(7) { transition-delay: 0.21s; }
.faq-question {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 20px 24px;
